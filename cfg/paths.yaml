# ============================================
# YOLO Dataset Paths
# ============================================
real_data_yaml: ./data_cfg/real_5k_linux.yaml
synth_data_yaml: ./data_cfg/mid_synth_train_linux.yaml

# ============================================
# Model Weights
# ============================================
warmed_up_model_weights: ./warmed_up_models/weights/best.pt

# ============================================
# Feature Database (CBIR)
# ============================================
hdf5_path: ./features/features_DenseNet201.hdf5

# ============================================
# Synthetic Data Generator
# ============================================
data_gen_env_dir: ./sdal_utils/Data_Generator
dataset_used_dir: ./sdal_utils/Data_Generator/Dataset_used

# ============================================
# 3D Assets for Blender Generation
# Set these to the absolute paths of your Blender 3D assets.
# These directories must contain .blend files for avatars and scenes.
# ============================================
avatar_dir: /path/to/your/Avatars
scene_dir: /path/to/your/Scenes

# Blender template files (must be placed in Data_Generator/)
empty_dir: ./sdal_utils/Data_Generator/Empty.blend
horizon_dir: ./sdal_utils/Data_Generator/Horizon.blend
report_dir: ./sdal_utils/Data_Generator/Report.txt
BlendCon_dir: ./sdal_utils/Data_Generator/231109_Adaptive_Data_Generator.py

# Scene collection for coordinate normalization
old_scene_collection_dir: /path/to/your/Old_3DAssets/Scenes

# ============================================
# Output
# ============================================
log_dir: ./logs